services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./mcp_config.json:/app/mcp_config.json:ro
      - ./src/dump:/app/src/dump
      - ./markdown_reports:/app/markdown_reports
      - ./src/dumptools/pdf_reports:/app/src/dumptools/pdf_reports
      - ./src/dumptools/docx_reports:/app/src/dumptools/docx_reports
    restart: unless-stopped
